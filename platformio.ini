; ===========================================================================
;  GOOUUU ESP32-S3-CAM  ·  "SENTINEL"  ·  Cámara de seguridad
;  Placa: ESP32-S3-WROOM-1 N16R8  (16 MB Flash / 8 MB PSRAM OPI)
; ===========================================================================
[env:goouuu_s3cam]
platform  = espressif32
board     = esp32-s3-devkitc-1          ; compatible con la GOOUUU S3-CAM
framework = arduino

; --- Velocidades ---
monitor_speed = 115200
upload_speed  = 921600

; --- Memoria (CRÍTICO para N16R8: PSRAM octal/OPI + Flash QIO) ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.f_flash             = 80000000L
board_upload.flash_size         = 16MB
board_build.partitions          = default_16MB.csv

; --- Banderas de compilación ---
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0        ; Serie por el puente CH343 (UART0).
                                       ; Si usas el puerto USB NATIVO, pon =1.
    -DCORE_DEBUG_LEVEL=1

; --- Librerías externas (la cámara y el servidor httpd vienen con el core) ---
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4

; Monitor con filtros útiles para depurar excepciones del S3
monitor_filters = esp32_exception_decoder, time
